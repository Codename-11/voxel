name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Check imports
        run: |
          uv run python -c "
          from hw.detect import IS_PI, probe_hardware
          from display.service import main
          from display.renderer import PILRenderer
          from display.backends.spi import WhisplayBackend
          from display.backends.tkinter import TkinterBackend
          from display.components.onboarding import needs_onboarding
          from core.gateway import OpenClawClient
          from config.settings import load_settings
          from shared import load_expressions, load_styles, load_moods
          print('All imports OK')
          "

      - name: Run tests
        run: uv run pytest tests/ -v --timeout=30

      - name: Validate shared YAML
        run: |
          uv run python -c "
          from shared import load_expressions, load_styles, load_moods
          expr = load_expressions()
          styles = load_styles()
          moods = load_moods()
          assert len(expr) >= 10, f'Expected 10+ expressions, got {len(expr)}'
          assert len(styles) >= 3, f'Expected 3+ styles, got {len(styles)}'
          assert 'state_map' in moods, 'Missing state_map in moods.yaml'
          print(f'Validated: {len(expr)} expressions, {len(styles)} styles')
          "

  build-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install and build React app
        run: |
          cd app
          npm ci
          npm run build

      - name: Verify build output
        run: test -f app/dist/index.html

  validate-pi-gen-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate pi-gen stage scripts (syntax check)
        run: |
          echo "Checking pi-gen stage scripts for bash syntax errors..."
          errors=0
          for script in scripts/pi-gen/stage-voxel/*/0*-run*.sh; do
            echo "  Checking ${script}..."
            if ! bash -n "${script}"; then
              echo "  FAIL: ${script} has syntax errors"
              errors=$((errors + 1))
            fi
          done
          if [ "${errors}" -gt 0 ]; then
            echo "Found ${errors} script(s) with syntax errors"
            exit 1
          fi
          echo "All pi-gen scripts pass syntax check"

      - name: Validate systemd service files
        run: |
          echo "Checking systemd service files for basic validity..."
          for unit in services/*.service; do
            echo "  Checking ${unit}..."
            # Verify required sections exist
            if ! grep -q '^\[Unit\]' "${unit}"; then
              echo "  FAIL: ${unit} missing [Unit] section"
              exit 1
            fi
            if ! grep -q '^\[Service\]' "${unit}"; then
              echo "  FAIL: ${unit} missing [Service] section"
              exit 1
            fi
            if ! grep -q '^\[Install\]' "${unit}"; then
              echo "  FAIL: ${unit} missing [Install] section"
              exit 1
            fi
          done
          echo "All service files pass validation"
