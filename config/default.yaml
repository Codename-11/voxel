# Voxel Configuration

# OpenClaw Gateway
gateway:
  url: "http://172.16.24.250:18789"  # Docker-Server LAN IP
  token: ""  # Set in local.yaml or env OPENCLAW_TOKEN
  default_agent: "daemon"

# Available agents
agents:
  - id: daemon
    name: Daemon
    emoji: "🖤"
    voice: charlie  # ElevenLabs voice
    description: Lead agent — coordinator
  - id: soren
    name: Soren
    emoji: "⭐"
    voice: adam
    description: Senior architect
  - id: ash
    name: Ash
    emoji: "🔩"
    voice: josh
    description: Builder/executor
  - id: mira
    name: Mira
    emoji: "📈"
    voice: rachel
    description: Business operator
  - id: jace
    name: Jace
    emoji: "🔄"
    voice: sam
    description: Flex agent
  - id: pip
    name: Pip
    emoji: "📋"
    voice: charlie
    description: Intern

# Display
display:
  mode: auto        # auto or whisplay (PIL→SPI on Pi, tkinter on desktop)
  width: 240
  height: 280
  fps: 30
  brightness: 80  # 0-100
  orientation: 0   # 0, 90, 180, 270
  remote_port: 8081
  clock: true             # show clock in status bar
  clock_24h: false        # false = 12h AM/PM, true = 24h
  timezone: ""            # empty = system default, or "America/New_York" etc
  transitions: false      # smooth transitions (disable on Pi Zero — saves memory)
  transition_speed: 0.3   # seconds for view cross-fade transitions
  status_animations: true  # show connection/battery visual indicators
  ambient_indicator: true  # show mic activity dot when ambient monitor hears sound

# LED
led:
  enabled: true
  brightness: 80        # 0-100 max brightness cap
  breathe_speed: 1.0    # multiplier for breathe animation speed

# Input
input:
  mode: auto        # auto, gpio, keyboard, or web

# Audio
audio:
  stt_provider: whisper  # whisper (cloud) or local
  tts_provider: edge     # elevenlabs, edge (free), or local
  wake_word: null        # null = push-to-talk only
  volume: 80             # 0-100
  device: default        # default, wm8960, usb, or ALSA device string
  ambient_react: true       # react to ambient sound from mic (deterministic, no LLM)
  ambient_sensitivity: 0.6  # 0-1, higher = more reactive to sound
  ambient_silence_timeout: 180  # seconds of silence before sleepy mood

# Speech-to-Text
stt:
  whisper:
    model: whisper-1
    language: en
    api_key: ""  # Set in local.yaml or env OPENAI_API_KEY

# Text-to-Speech
tts:
  openai:
    api_key: ""  # Falls back to stt.whisper.api_key (same OpenAI account)
    model: tts-1  # tts-1 (fast), tts-1-hd (quality), gpt-4o-mini-tts (newest)
    voice: nova   # alloy, ash, ballad, coral, echo, fable, nova, onyx, sage, shimmer
  elevenlabs:
    api_key: ""  # Set in local.yaml or env ELEVENLABS_API_KEY
    model: eleven_turbo_v2_5
  edge:
    voice: en-US-ChristopherNeural

# Face/Character
character:
  default: voxel               # voxel, cube, bmo (which character to render)
  accent_color: "#00d4d2"     # primary accent color (eyes, glow, edges) — hex string
  idle_blink_interval: 3.5  # blink timing scale (lower = more frequent, 3.5 = default)
  gaze_drift_speed: 0.5     # saccadic eye movement speed (0.1 = slow/rare, 1.0 = fast/frequent)
  gaze_range: 0.8           # how far eyes shift when looking around (0 = none, 1.0 = max)
  mouth_sensitivity: 0.6    # audio amplitude → mouth opening (0 = no mouth movement, 1 = full)
  breathing_speed: 0.3      # body scale breathing rate (0.1 = very slow, 1.0 = fast)
  system_context: |
    You are speaking through Voxel, a pocket AI companion device.
    Keep responses concise (1-3 sentences for voice, a short paragraph for text).
    The user interacts via voice (push-to-talk) or text chat on a tiny screen.
    Be conversational, warm, and brief.
    Begin each response with a mood tag in brackets matching your tone:
    [happy] [curious] [thinking] [excited] [sad] [surprised] [neutral] [confused]
    Example: [happy] That's a great question!
  system_context_enabled: true
  idle_personality: true      # enable reactive moods during idle (battery, connection, time)
  idle_prompt: true           # show "?" hint after prolonged idle
  idle_prompt_interval: 90    # seconds between "?" appearances
  greeting: "Hey! I'm Voxel. Double-tap to talk, or send a message."
  greeting_enabled: true      # show greeting on first boot / empty chat
  demo_mode: false           # auto-cycle moods/characters/styles for showcase
  demo_cycle_speed: 5        # seconds per mood in demo mode
  demo_include_characters: true  # cycle through characters too
  demo_include_styles: true      # cycle through face styles too

# Outbound webhooks
webhook:
  enabled: false
  url: "http://172.16.24.250:18789/hooks/agent"
  token: ""  # Bearer token — set in local.yaml
  events: [state_change, battery_alert, conversation_complete]
  debounce_seconds: 5

# Conversation pipeline
pipeline:
  error_display_seconds: 3     # How long ERROR state shows before returning to IDLE
  max_recording_seconds: 30    # Safety cap on recording duration
  min_recording_bytes: 1000    # Minimum WAV size to attempt STT
  chat_history_limit: 50       # Max messages kept in memory

# Power management
power:
  sleep_after_idle: 300     # seconds of no interaction → sleep mode
  dim_after_idle: 60        # seconds → dim display
  dim_brightness: 20        # brightness when dimmed

# Development
dev:
  enabled: false          # show dev indicators, skip web auth, debug endpoints
  advertise: true         # broadcast device presence on LAN (UDP 41234)
  ssh:
    host: ""              # Pi SSH host (set by display-push)
    user: pi
    password: ""

# Updates
updates:
  auto_check: true        # check for updates on boot
  auto_install: false     # require confirmation before installing
  channel: main           # git branch to track
  repo: origin            # git remote

# MCP Server (Model Context Protocol — exposes device tools to AI agents)
mcp:
  enabled: false           # start MCP server with display service
  transport: sse           # sse (network, for OpenClaw) or stdio (local, for Claude Code)
  port: 8082              # SSE transport port
  ws_url: "ws://localhost:8080"  # backend WebSocket to connect to
