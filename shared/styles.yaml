# Voxel — Face style themes (single source of truth)
#
# Each style defines eye type, mouth type, colors, sizes, and X_X error eyes.
# Python source: face/styles.py  |  JS mirror: design/src/styles.js
#
# Colors stored as hex strings or rgba() strings.
# Python loader converts to tuples; JS consumers use as-is.

kawaii:
  name: Kawaii
  description: "White rounded-rect eyes, small offset smile - modern companion style"
  eye:
    type: roundrect
    base_width: 30
    base_height: 38
    highlight_size: 0
    highlight_color: "rgba(0, 0, 0, 0)"
    fill_color: "#f0f0f0"
    glow_color: "rgba(240, 240, 240, 0.15)"
    border_radius: 0.28
    closed_radius: 0.35
    iris_color: "#0a0a12"
    iris_size: 0.55
  mouth:
    type: offset
    base_width: 30
    stroke_width: 3
    color: "#f0f0f0"
    teeth_color: "#ffffff"
    lip_color: "#121220"
  x_eye:
    color: "#ff3c3c"
    thickness: 3
    size: 22

retro:
  name: Retro
  description: "Big expressive eyes with irises, toothy grin - Fallout/Cuphead style"
  eye:
    type: iris
    base_width: 36
    base_height: 42
    highlight_size: 7
    highlight_color: "rgba(255, 255, 255, 0.9)"
    fill_color: "#f0f0f0"
    glow_color: "rgba(255, 255, 255, 0.1)"
    border_radius: 0.50
    closed_radius: 0.45
    iris_color: "#0a0a12"
    iris_size: 0.55
  mouth:
    type: teeth
    base_width: 36
    stroke_width: 2
    color: "#f0f0f0"
    teeth_color: "#ffffff"
    lip_color: "#121220"
  x_eye:
    color: "#ff3c3c"
    thickness: 4
    size: 26

minimal:
  name: Minimal
  description: "Tiny dot eyes, dash mouth - lo-fi pixel style"
  eye:
    type: dot
    base_width: 10
    base_height: 10
    highlight_size: 0
    highlight_color: "rgba(0, 0, 0, 0)"
    fill_color: "#00d4d2"
    glow_color: "rgba(0, 212, 210, 0.4)"
    border_radius: 0.50
    closed_radius: 0.50
    iris_color: "#0a0a12"
    iris_size: 0.55
  mouth:
    type: arc
    base_width: 18
    stroke_width: 2
    color: "#006460"
    teeth_color: "#ffffff"
    lip_color: "#121220"
  x_eye:
    color: "#ff3c3c"
    thickness: 2
    size: 12
