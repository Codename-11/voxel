    width: 1.1
    height: 1.1
    openness: 1.0
    pupil_size: 0.5
    gaze_x: 0
    gaze_y: 0
    blink_rate: 1.5
    squint: 0
  mouth:
    openness: 0.15
    smile: 0.1
    width: 1.0
  body:
    bounce_speed: 0.4
    bounce_amount: 2
    tilt: 8
    scale: 1.02

thinking:
