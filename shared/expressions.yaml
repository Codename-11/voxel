# Voxel — Expression definitions (single source of truth)
#
# Each mood defines eyes, mouth, and body configs.
# Optional: left_eye / right_eye per-eye overrides, eye_color_override.
#
# Animation modifiers (display/modifiers.py):
#   modifiers:
#     - type: bounce_boost       # multiply bounce amount
#       factor: 1.4
#     - type: tilt_oscillation   # sinusoidal tilt
#       speed: 1.2
#       amount: 3.5
#     - type: eye_swap           # periodic big/small eye swap
#       cycle: 7.0
#       gaze_influence: 0.3
#     - type: shake              # random position jitter
#       range: 2
#     - type: squint_pulse       # slow squint modulation
#       speed: 0.8
#       amount: 0.15
#     - type: gaze_wander        # lateral gaze drift
#       speed: 0.6
#       range: 0.25
#
# Composition:
#   extends: <mood>              # inherit base expression
#   blend:                       # lerp toward other moods
#     <mood>: <weight 0-1>
#
# Keys use snake_case. Consumers convert to their native convention
# (e.g. JS loader camelCases automatically).

neutral:
  eyes:
    width: 1.0
    height: 1.0
    openness: 1.0
    pupil_size: 0.4
    gaze_x: 0
    gaze_y: 0
    blink_rate: 3.0
    squint: 0
  mouth:
    openness: 0
    smile: 0.3
    width: 1.0
  body:
    bounce_speed: 0.3
    bounce_amount: 2
    tilt: 0
    scale: 1.0

happy:
  # Happy squint -- eyes narrow but still clearly pill-shaped, big U smile
  eyes:
    width: 1.05
    height: 0.95
    openness: 0.75
    pupil_size: 0.4
    gaze_x: 0
    gaze_y: 0
    blink_rate: 2.0
    squint: 0
  mouth:
    openness: 0
    smile: 1.0
    width: 1.3
  body:
    bounce_speed: 0.7
    bounce_amount: 4
    tilt: 0
    scale: 1.0

curious:
