# Voxel — Expression definitions (single source of truth)
#
# Each mood defines eyes, mouth, and body configs.
# Optional: left_eye / right_eye per-eye overrides, eye_color_override.
# Python source: face/expressions.py  |  JS mirror: design/src/expressions.js
#
# Keys use snake_case. Consumers convert to their native convention
# (e.g. JS loader camelCases automatically).

neutral:
  eyes:
    width: 1.0
    height: 1.0
    openness: 0.9
    pupil_size: 0.4
    gaze_x: 0
    gaze_y: 0
    blink_rate: 3.0
    squint: 0
  mouth:
    openness: 0
    smile: 0.3
    width: 1.0
  body:
    bounce_speed: 0.3
    bounce_amount: 2
    tilt: 0
    scale: 1.0

happy:
  # Happy squint -- both eyes narrow, big U smile (closed mouth, high smile)
  eyes:
    width: 1.05
    height: 0.75
    openness: 0.7
    pupil_size: 0.4
    gaze_x: 0
    gaze_y: 0
    blink_rate: 2.0
    squint: 0
  mouth:
    openness: 0
    smile: 1.0
    width: 1.3
  body:
    bounce_speed: 0.7
    bounce_amount: 4
    tilt: 0
    scale: 1.0

curious:
