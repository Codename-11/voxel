    openness: 0.75
    pupil_size: 0.35
    gaze_x: 0.4
    gaze_y: -0.2
    blink_rate: 1.0
    squint: 0
  # Gentle raised eyebrow -- left open, right slightly narrower
  left_eye:
    openness: 0.9
    height: 1.05
  right_eye:
    openness: 0.45
    height: 0.65
  mouth:
    openness: 0
    smile: 0.0
