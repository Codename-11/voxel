# ── Composed expressions ──────────────────────────────────────────────

surprised_by_sound:
  # Surprised base + 35% curious influence (wider eyes, head tilt, gaze wander)
  extends: surprised
  blend:
    curious: 0.35
  modifiers:
    - type: gaze_wander
      speed: 0.6
      range: 0.2
